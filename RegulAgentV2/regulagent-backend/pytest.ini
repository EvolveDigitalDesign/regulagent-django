[pytest]
# Note: To use test settings, run pytest with:
# DJANGO_SETTINGS_MODULE=ra_config.settings.test python -m pytest
# Or in Docker:
# docker-compose -f docker/compose.dev.yml exec -e DJANGO_SETTINGS_MODULE=ra_config.settings.test web python -m pytest
DJANGO_SETTINGS_MODULE = ra_config.settings.test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    -v
    --ignore=apps/public_core/tests/test_w3_extraction_debug.py
    --reuse-db
    --strict-markers
testpaths = apps
markers =
    django_db: marks tests as needing database access
    golden: marks tests as golden/regression tests
    integration: marks tests as integration tests
    slow: marks tests as slow running
    tenant: marks tests requiring tenant context
