sections:
  intro: ''
  general:
    title: General Plugging Requirements
    text: 'General Plugging Requirements.

      (1) All wells shall be plugged in a manner that protects all formations
      bearing usable quality water, oil, gas, or other minerals.

      (2) Cement plugs shall be placed by circulation or squeeze method through
      tubing or drill pipe.

      (3) All cement for plugging shall be conventional hard-setting cement mixed
      in accordance with API standards.

      (4) Minimum plug length shall be 100 feet OR 25 sacks of cement, whichever
      is greater.

      (5) All cement plugs shall have sufficient slurry volume to fill the calculated
      height plus cement excess: 50% for cased hole, 100% for open hole.

      (6) Maximum spacing between plugs: 3000 feet in cased hole, 2000 feet in
      open hole.

      (7) Cement shall stand for minimum 4 hours wait-on-cement time before disturbing.

      (8) Cement shall stand 8-18 hours (minimum 8 hours, or until 500 psi compressive
      strength is achieved in specific counties) before testing or drilling out.'
  surface_casing:
    title: Plugging Requirements for Wells with Surface Casing
    text: 'Plugging Requirements for Wells with Surface Casing.

      (1) When insufficient surface casing is set to protect all usable quality
      water strata and such strata are exposed to the wellbore, a cement plug shall
      extend at least 50 feet above and 50 feet below the base of the deepest usable
      quality water stratum. Minimum plug length shall be 100 feet OR 25 sacks,
      whichever is greater.

      (2) A cement plug shall be set across the shoe of the surface casing. This
      plug shall extend at least 50 feet above and below the shoe. Minimum plug
      length shall be 100 feet OR 25 sacks, whichever is greater.

      (3) If surface casing has been set deeper than 200 feet below the base of
      the deepest usable quality water stratum, an additional cement plug shall
      be placed inside the surface casing across the base of the deepest usable
      quality water stratum. This plug shall extend at least 50 feet below and 50
      feet above the base.

      (4) Plugs shall be set as necessary to separate multiple usable quality water
      strata.

      (5) Surface casing may not be removed from a well at abandonment.'
  intermediate_casing:
    title: Plugging Requirements for Wells with Intermediate Casing
    text: 'Plugging Requirements for Wells with Intermediate Casing.

      (1) For wells in which the intermediate casing has been cemented through all
      usable quality water strata and all productive horizons, a cement plug shall
      be placed inside the casing and centered opposite the base of the deepest
      usable quality water stratum. Minimum plug length shall be 100 feet OR 25
      sacks, whichever is greater. The plug shall extend no less than 50 feet above
      and below the base of the deepest usable quality water stratum.

      (2) For wells in which intermediate casing is not cemented through all usable
      quality water strata and all productive horizons, and if the casing will not
      be pulled, the intermediate casing shall be perforated at the required depths
      to place cement outside of the casing by squeeze cementing through casing
      perforations.

      (3) Plugs shall be set as necessary to separate multiple usable quality water
      strata.

      (4) Minimum cement standing time: 300 feet at bottom of intermediate casing
      per NMAC 19.15.16.10(E).'
  production_casing:
    title: Plugging Requirements for Wells with Production Casing
    text: 'Plugging Requirements for Wells with Production Casing.

      (1) For wells in which the production casing has been cemented through all
      usable quality water strata and all productive horizons, a cement plug shall
      be placed inside the casing and centered opposite the base of the deepest
      usable quality water stratum. Minimum plug length shall be 100 feet OR 25
      sacks, whichever is greater. The plug shall extend at least 50 feet below
      and 50 feet above the base of the deepest usable quality water stratum.

      (2) For wells in which the production casing has not been cemented through
      all usable quality water strata and all productive horizons and if the casing
      will not be pulled, the production casing shall be perforated at the required
      depths to place cement outside of the casing by squeeze cementing through
      casing perforations.

      (3) Cast iron bridge plugs may be placed immediately above each perforated
      interval, provided at least 100 feet of cement is placed on top of each bridge
      plug (or 35 feet if set with bailer). A bridge plug shall not be set at a
      depth where the pressure or temperature exceeds the ratings recommended by
      the manufacturer.

      (4) Plugs shall be set as necessary to separate multiple usable quality water
      strata.

      (5) Production casing cement requirement: 500 feet above uppermost perforation
      per NMAC 19.15.16.10(E).'
  open_hole:
    title: Plugging Requirements for Wells Without Production Casing and Open-Hole
      Completions
    text: 'Plugging Requirements for Wells Without Production Casing and Open-Hole
      Completions.

      (1) Any productive horizon or any formation in which a pressure or formation
      water problem is known to exist shall be isolated by cement plugs centered
      at the top and bottom of the formation. Minimum plug length shall be 100 feet
      OR 25 sacks, whichever is greater.

      (2) Each cement plug shall have sufficient slurry volume to fill the calculated
      height plus 100% cement excess for open hole conditions.

      (3) If the gross thickness of any such formation is less than 100 feet, the
      tubing or drill pipe shall be suspended 50 feet below the base of the formation.
      Sufficient slurry volume shall be pumped to fill the calculated height from
      the bottom of the tubing or drill pipe up to a point at least 50 feet above
      the top of the formation, plus 100% excess for open hole.'
  marker:
    title: Surface Marker Requirements
    text: 'Surface Marker Requirements.

      (1) Upon completion of plugging operations, a permanent marker shall be installed
      at the well location.

      (2) The marker shall be a four-inch steel post or pipe extending at least
      four feet above ground surface.

      (3) The marker shall be marked with the well name, API number, and date of
      abandonment.'
