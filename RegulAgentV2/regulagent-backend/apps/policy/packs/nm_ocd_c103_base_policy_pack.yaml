# Formula Engine Configuration
# Specifies which formula engine to use for regulatory calculations.
# See: apps/policy/services/formula_engine.py
formula_engine:
  jurisdiction: NM
  engine_class: NewMexicoFormulas
  version: "2026.02.0"
  # Configuration overrides (defaults from formula_engine.py)
  config:
    # NM uses flat excess, not depth-based like TX
    # 50% for cased hole, 100% for open hole
    cased_hole_excess: 0.50
    open_hole_excess: 1.00
    # Cement class cutoff depth (NM doesn't specify - using TX as default)
    cement_class_cutoff_ft: 6500
    shallow_class: C
    deep_class: H
    # Coverage requirements per plug type (in feet)
    coverage_defaults:
      casing_shoe: 50       # NMAC 19.15.25
      duqw: 50              # NMAC 19.15.25
      production_horizon: 50
      intermediate_shoe: 50
      top_plug: 0
      cibp_cap: 100         # NMAC 19.15.25 (NM = 100 ft, TX = 20 ft)
    # NM-specific parameters
    min_sacks: 25
    max_cased_spacing_ft: 3000
    max_open_spacing_ft: 2000
    woc_hours: 4
    cement_standing_min_hours: 8
    cement_standing_max_hours: 18
preferences:
  rounding_policy: nearest
  default_recipe:
    id: class_h_neat_15_8
